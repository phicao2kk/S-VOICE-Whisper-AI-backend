services:
  - type: web
    name: s-voice-whisper
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install setuptools wheel
      pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 10000  # Render tự động gán, nhưng để rõ ràng
